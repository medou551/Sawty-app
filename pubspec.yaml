name: sawti_voter_app
description: "Sawti صوتي — Vote électronique sécurisé CENI Mauritanie"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # ✅ Supabase (auth + base de données + storage)
  supabase_flutter: ^2.5.0

  # UI & typographie
  google_fonts: ^6.1.0

  # Géolocalisation
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # Réseau
  connectivity_plus: ^5.0.2
  http: ^1.2.0
  retry: ^3.1.2

  # Cache offline
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0

  # Utilitaires
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoNaskhArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - .env
